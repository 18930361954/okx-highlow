strategy:
  pairs: [BTC-USDT-SWAP, ETH-USDT-SWAP]
  position_pct: 0.10
  float_pct: 0.0015
  tp_pct: 0.012
  sl_pct: 0.005
  pair_overrides:
    BTC-USDT-SWAP:
      sl_pct: 0.005
      tp_pct: 0.012
      float_pct: 0.002                  # 首次浮动 0.2%（比默认 0.15% 稍宽以适配 BTC 波动）
      reentry_floats: [0.002, 0.004]    # SL 后日内重挂：第1次0.2%、第2次0.4%（保守组合）
    ETH-USDT-SWAP:
      sl_pct: 0.010
      tp_pct: 0.020
      reentry_floats: [0.0015, 0.006]   # SL 后日内重挂：第1次0.15%、第2次0.6%（最优组合）
  leverage: 100
  trend_filter: true
  max_consecutive_losses: 3
  cooldown_hours: 24
  fixed_mode_threshold: 800000
  fixed_mode_margin: 1000
  signal_time_utc: "00:00"

system:
  log_level: INFO
  log_keep_days: 30
  db_path: data/trades.db
  daily_report_time_utc: "23:55"

account:
  env: demo
  td_mode: cross   # cross 全仓 / isolated 逐仓。建议 cross 避免 set_leverage 被旧 TP/SL 单卡住
