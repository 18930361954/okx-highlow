strategy:
  # 顶层 = 兜底默认。每个账户会在 accounts[].strategy 里覆盖 signal_bar 和三币 tp/sl/float。
  # 顶层不再挂 pair_overrides,避免污染每账户配置(以前的"3 币安全档"已迁移到每账户)。
  pairs: [BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP]
  position_pct: 0.10                  # 每笔仓位 10% 保证金,3 币满仓时占 30% 保证金
  leverage: 100                       # 默认 100x;SOL 由 pair_overrides 覆盖到 50x (实盘 API 上限)
  float_pct: 0.0015                   # 兜底,每账户会覆盖
  tp_pct: 0.012
  sl_pct: 0.005
  trend_filter: true
  max_consecutive_losses: 3
  cooldown_hours: 24
  fixed_mode_threshold: 800000
  fixed_mode_margin: 1000
  signal_time_utc: "00:00"
  # 多币下单之间的间隔(秒)。防 OKX algo 单并发限流导致 51149 下单超时。
  place_gap_sec: 1.0

  # 单笔张数封顶(与回测口径一致)
  # BTC 1000 张 × 0.01 = 10 BTC/笔;ETH 5000 张 × 0.1 = 500 ETH/笔;SOL 5000 张 × 1 = 5000 SOL/笔
  # 每账户 pair_overrides 可加 max_contracts 单独覆盖
  max_contracts:
    BTC-USDT-SWAP: 1000
    ETH-USDT-SWAP: 5000
    SOL-USDT-SWAP: 5000

system:
  log_level: INFO
  log_keep_days: 30
  db_path: data/trades.db
  daily_report_time_utc: "23:55"

account:
  env: demo
  td_mode: cross   # cross 全仓 / isolated 逐仓。建议 cross 避免 set_leverage 被旧 TP/SL 单卡住

network:
  proxy_enabled: true              # 打开时 OKX REST 全部走 proxy_url
  proxy_url: "http://127.0.0.1:18081"

# ---------------- 多账户 (multi-account) ----------------
# 用于「一进程内并行跑多个策略/API key」的实盘部署。
# 每账户可选字段:
#   account_name / name          必填,标识 (用于 db account 列 + 日志前缀)
#   enabled                       默认 true;false 时跳过
#   env_adapt / env               real|live / demo
#   api_key / secret_key / passphrase   该账户的 OKX API 三件套
#   pairs                         该账户跑哪些 pair;缺省沿用 strategy.pairs
#   strategy                      可选,覆盖顶层 strategy 的任意字段(浅覆盖,pair_overrides 深合并)
#   td_mode                       cross / isolated;缺省沿用 account.td_mode
#
# 无 accounts 段 → 自动从 .env 合成一个名为 default 的账户(行为等价旧 main.py)
accounts:
  # ==================== 参数选拔口径 ====================
  # 每笔固定 10% margin,单笔封顶 1500 USDT,taker 5bp × 2,funding 3bp/8h,滑点 10bp。
  # 参数已过 Walk-Forward 反过拟合 (18 月 train → 6 月 test 仍盈利,MDD 不显著恶化)
  # 参数已过 10bp 滑点敏感性 (OKX 主流币日常滑点 5-15bp 是稳健区间)
  # 参数详情见 docs/backtest_validated.md
  #
  # ==================== 实盘账户 ====================
  # 「4H 三币组合」— 每天 6 次挂单
  - account_name: 初级炼气士-实盘
    enabled: false                    # ← 先跑模拟盘,验证 3-5 天后再改 true
    api_key: abf7c8b5-a75d-4470-866f-52b53bb14a86
    secret_key: 0B7B65EF1A008BDD965F2C85DDA652B0
    passphrase: Zdx19971226@@
    env_adapt: real
    strategy:
      signal_bar: 4H
      pair_overrides:
        BTC-USDT-SWAP: { float_pct: 0.005, tp_pct: 0.006, sl_pct: 0.020 }
        ETH-USDT-SWAP: { float_pct: 0.004, tp_pct: 0.006, sl_pct: 0.020 }
        SOL-USDT-SWAP: { float_pct: 0.005, tp_pct: 0.006, sl_pct: 0.020 }

