strategy:
  pairs: [BTC-USDT-SWAP, ETH-USDT-SWAP]
  position_pct: 0.10
  float_pct: 0.0015
  tp_pct: 0.012
  sl_pct: 0.005
  pair_overrides:
    BTC-USDT-SWAP:
      # 联合回测（含成本+行情过滤）180d 最优组合
      position_pct: 0.05                # 单笔仓位 5%（保守：单笔亏损上限 5×100×0.4% = 2%）
      tp_pct: 0.015                     # 止盈 1.5%
      sl_pct: 0.004                     # 止损 0.4%（TP:SL = 3.75:1，高盈亏比抵消手续费）
      float_pct: 0.002                  # 首次浮动 0.2%
      reentry_floats: [0.002, 0.004]    # SL 后日内重挂
      min_prev_amp: 0.01                # 前日振幅 <1% 不入场（死水日）
      max_prev_amp: 0.04                # 前日振幅 >4% 不入场（极端事件日）
    ETH-USDT-SWAP:
      position_pct: 0.08                # 单笔仓位 8%（单笔亏损上限 8×100×0.7% = 5.6%）
      tp_pct: 0.020                     # 止盈 2%
      sl_pct: 0.007                     # 止损 0.7%（TP:SL = 2.86:1）
      reentry_floats: [0.0015, 0.006]   # SL 后日内重挂
      min_prev_amp: 0.01
      max_prev_amp: 0.04
  leverage: 100
  trend_filter: true
  max_consecutive_losses: 3
  cooldown_hours: 24
  fixed_mode_threshold: 800000
  fixed_mode_margin: 1000
  signal_time_utc: "00:00"

system:
  log_level: INFO
  log_keep_days: 30
  db_path: data/trades.db
  daily_report_time_utc: "23:55"

account:
  env: demo
  td_mode: cross   # cross 全仓 / isolated 逐仓。建议 cross 避免 set_leverage 被旧 TP/SL 单卡住
