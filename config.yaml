strategy:
  pairs: [BTC-USDT-SWAP, ETH-USDT-SWAP, SOL-USDT-SWAP]
  position_pct: 0.10
  float_pct: 0.0015
  tp_pct: 0.012
  sl_pct: 0.005
  pair_overrides:
    # 3 币安全档：BTC 4% / ETH 6% / SOL 15%（在强平安全约束下的最优）
    # 2Y 回测 280U → 858,132U（+306,376%），MDD 51.6%，月化 +39.15%
    # 强平门槛：三对全 SL 失效需≥5.21%，ETH 单独失效需≥12.04%
    BTC-USDT-SWAP:
      position_pct: 0.04                # 单笔仓位 4%（降低 BTC 敞口）
      leverage: 100
      tp_pct: 0.010                     # 止盈 1.00%（BTC 胜率 61.6%）
      sl_pct: 0.010                     # 止损 1.00%（R:R=1）
      float_pct: 0.002                  # 首次浮动 0.2%
      reentry_floats: [0.002, 0.004]    # SL 后日内重挂
      min_prev_amp: 0.01
      max_prev_amp: 0.0475              # 前日振幅 >4.75% 不入场
    ETH-USDT-SWAP:
      position_pct: 0.06                # 单笔仓位 6%（降低 ETH 敞口以过安全线）
      leverage: 100
      tp_pct: 0.014                     # 止盈 1.4%（ETH 胜率 52.2%）
      sl_pct: 0.008                     # 止损 0.80%
      reentry_floats: [0.0015, 0.006]   # SL 后日内重挂
      min_prev_amp: 0.01
      max_prev_amp: 0.08                # 前日振幅 >8% 不入场
    SOL-USDT-SWAP:
      position_pct: 0.15                # 单笔仓位 15%（SOL 胜率 78.4%，主发动机）
      leverage: 50                      # SOL 50x（比 BTC/ETH 低半）
      tp_pct: 0.010                     # 止盈 1.00%
      sl_pct: 0.020                     # 止损 2.00%（高胜率补偿低 R:R=0.5）
      float_pct: 0.002                  # 首次浮动 0.2%
      reentry_floats: [0.002, 0.008]    # SL 后日内重挂
      min_prev_amp: 0.015               # SOL 振幅 <1.5% 不入场
      max_prev_amp: 0.12                # SOL 振幅 >12% 不入场（去掉极端事件日）
  leverage: 100
  trend_filter: true
  max_consecutive_losses: 3
  cooldown_hours: 24
  fixed_mode_threshold: 800000
  fixed_mode_margin: 1000
  signal_time_utc: "00:00"
  # 多币下单之间的间隔（秒）。防 OKX algo 单并发限流导致 51149 下单超时。
  place_gap_sec: 1.0

system:
  log_level: INFO
  log_keep_days: 30
  db_path: data/trades.db
  daily_report_time_utc: "23:55"

account:
  env: demo
  td_mode: cross   # cross 全仓 / isolated 逐仓。建议 cross 避免 set_leverage 被旧 TP/SL 单卡住

network:
  proxy_enabled: false             # 打开时 OKX REST 全部走 proxy_url
  proxy_url: "http://127.0.0.1:18081"

# ---------------- 多账户 (multi-account) ----------------
# 用于「一进程内并行跑多个策略/API key」的实盘部署。
# 每账户可选字段:
#   account_name / name          必填,标识 (用于 db account 列 + 日志前缀)
#   enabled                       默认 true;false 时跳过
#   env_adapt / env               real|live / demo
#   api_key / secret_key / passphrase   该账户的 OKX API 三件套
#   pairs                         该账户跑哪些 pair;缺省沿用 strategy.pairs
#   strategy                      可选,覆盖顶层 strategy 的任意字段(浅覆盖,pair_overrides 深合并)
#   td_mode                       cross / isolated;缺省沿用 account.td_mode
#
# 无 accounts 段 → 自动从 .env 合成一个名为 default 的账户(行为等价旧 main.py)
